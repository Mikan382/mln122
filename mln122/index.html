<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f0e7" />
    <meta
      name="description"
      content="Hành trình tương tác về công nghiệp hóa, hiện đại hóa Việt Nam từ Đổi mới 1986 đến hiện nay."
    />
    <title>Hành trình Kiến thiết 1986–2026 · Nhóm 7</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&family=Outfit:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="preload" as="image" href="./assets/era-01-doi-moi-1986-1995.jpg" />
    <link rel="preload" as="image" href="./assets/era-02-tang-toc-1996-2006.jpg" />
    <link rel="preload" as="image" href="./assets/era-03-hoi-nhap-sau-2007-2020.jpg" />
    <link rel="preload" as="image" href="./assets/era-04-doi-chat-2021-2026.jpg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <a class="skip-link" href="#game-root">Bỏ qua thanh điều hướng</a>

    <div class="app-shell" id="app-shell">
      <header class="topbar" id="topbar">
        <button class="brand" type="button" data-action="go-home" aria-label="Về trang mở đầu">
          <span class="brand__mark" aria-hidden="true">07</span>
          <span class="brand__copy">
            <strong>Hành trình Kiến thiết</strong>
            <small>Việt Nam · 1986–2026</small>
          </span>
        </button>

        <div class="route-status" aria-label="Tiến độ hành trình">
          <span class="route-status__label" id="route-label">Mở đầu</span>
          <div
            class="route-status__track"
            id="route-progressbar"
            role="progressbar"
            aria-valuemin="0"
            aria-valuemax="4"
            aria-valuenow="0"
          >
            <span id="route-progress"></span>
          </div>
          <span class="route-status__count" id="route-count">0 / 4</span>
        </div>

        <nav class="utility-nav" aria-label="Công cụ">
          <button class="mode-switch" type="button" data-action="toggle-mode" aria-pressed="false">
            <span class="mode-switch__dot" aria-hidden="true"></span>
            <span id="mode-label">Cá nhân</span>
          </button>
          <button class="icon-button presenter-button" type="button" data-action="open-presenter" title="Kịch bản 25 phút (P)">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8.5" /><path d="M12 7.5V12l3 2m-3-11v1.5" /></svg>
            <span class="presentation-mini-time" id="presentation-mini-time" aria-hidden="true">25:00</span>
            <span class="sr-only">Kịch bản trình bày 25 phút</span>
          </button>
          <button class="icon-button utility-nav__optional" type="button" data-action="open-sources" title="Nguồn và AI Usage">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H20v15H6.5A2.5 2.5 0 0 0 4 20.5zm0 0v15M8 7h8m-8 4h8" /></svg>
            <span class="sr-only">Nguồn và AI Usage</span>
          </button>
          <button class="icon-button utility-nav__optional" type="button" data-action="toggle-fullscreen" title="Toàn màn hình (F)">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 3H3v5m13-5h5v5M8 21H3v-5m13 5h5v-5" /></svg>
            <span class="sr-only">Toàn màn hình</span>
          </button>
          <button class="icon-button" type="button" data-action="open-help" title="Hướng dẫn (?)">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" /><path d="M9.7 9a2.5 2.5 0 1 1 3.3 2.37c-.6.25-1 .82-1 1.47V14m0 3h.01" /></svg>
            <span class="sr-only">Hướng dẫn</span>
          </button>
        </nav>
      </header>

      <main id="game-root" tabindex="-1"></main>
    </div>

    <div id="overlay-root"></div>
    <div class="toast-region" id="toast-region" role="status" aria-live="polite" aria-atomic="true"></div>

    <noscript>
      <div class="noscript">Game cần JavaScript để vận hành và lưu tiến trình học.</div>
    </noscript>

    <script src="./content.js"></script>
    <script src="./simulator.js"></script>
    <script src="./game.js"></script>
  </body>
</html>
